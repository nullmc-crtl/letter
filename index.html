<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ellie 💌</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="password-box">
            <span class="lock-icon">🔐</span>
            <h1>A Letter Awaits</h1>
            <p class="hint">Enter the secret name to unlock</p>
            
            <input 
                type="text" 
                id="passwordInput" 
                class="password-input" 
                placeholder="Enter name..." 
                autocomplete="off" 
                autocorrect="off" 
                autocapitalize="off" 
                spellcheck="false"
            >
            
            <button id="unlockBtn" class="unlock-btn">Unlock</button>
            
            <p id="errorMsg" class="error-message">That's not the right name 💔</p>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
