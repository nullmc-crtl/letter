<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 💌</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Floating hearts background animation */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.3);
            font-size: 20px;
            animation: float 15s infinite linear;
            bottom: -100px;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 600px;
            perspective: 1000px;
        }

        /* Password Screen */
        .password-screen {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transform-style: preserve-3d;
            transition: all 0.6s ease;
        }

        .password-screen.hidden {
            opacity: 0;
            transform: rotateY(-90deg);
            pointer-events: none;
        }

        .lock-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: block;
        }

        .password-screen h2 {
            color: #764ba2;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .hint {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 25px;
            font-style: italic;
        }

        .password-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
            margin-bottom: 15px;
        }

        .password-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .password-input.error {
            border-color: #ff6b6b;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .unlock-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .unlock-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .unlock-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .error-message.show {
            opacity: 1;
        }

        /* Letter Screen */
        .letter-screen {
            display: none;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            padding: 0;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            transform-style: preserve-3d;
            opacity: 0;
            transform: rotateY(90deg);
            transition: all 0.6s ease;
        }

        .letter-screen.show {
            display: block;
            opacity: 1;
            transform: rotateY(0deg);
        }

        .letter-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .letter-header::before {
            content: '❤';
            position: absolute;
            font-size: 100px;
            opacity: 0.1;
            top: -20px;
            right: -20px;
        }

        .letter-header h1 {
            font-size: 2rem;
            font-weight: normal;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }

        .letter-date {
            opacity: 0.8;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .letter-content {
            padding: 40px 30px;
            color: #444;
            line-height: 1.8;
            font-size: 1.1rem;
            min-height: 400px;
        }

        /* Typewriter Effect Styles */
        .typewriter-line {
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            margin-bottom: 20px;
            text-align: justify;
            position: relative;
        }

        .typewriter-line.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .typewriter-line.typing::after {
            content: '|';
            animation: blink 1s infinite;
            color: #764ba2;
            margin-left: 2px;
            font-weight: 100;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Cursor for active typing */
        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #764ba2;
            animation: blink 1s infinite;
            margin-left: 2px;
            vertical-align: text-bottom;
        }

        .letter-signature {
            text-align: right;
            margin-top: 40px;
            font-style: italic;
            color: #764ba2;
            font-size: 1.2rem;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .letter-signature.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .wax-seal {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #c92a2a);
            border-radius: 50%;
            margin: 30px auto 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 4px 15px rgba(201, 42, 42, 0.4), inset 0 -5px 10px rgba(0,0,0,0.1);
            position: relative;
            opacity: 0;
            transform: scale(0) rotate(-180deg);
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .wax-seal.visible {
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }

        .wax-seal::after {
            content: '';
            position: absolute;
            inset: 5px;
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 50%;
        }

        .letter-footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
        }

        .stamp {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 80px;
            background: #ff6b6b;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 30px;
            transform: rotate(12deg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            opacity: 0.9;
        }

        /* Progress indicator */
        .typing-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
            z-index: 1000;
        }

        /* Skip button */
        .skip-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(118, 75, 162, 0.8);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }

        .skip-btn.visible {
            opacity: 1;
        }

        .skip-btn:hover {
            background: rgba(118, 75, 162, 1);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                width: 95%;
            }
            
            .password-screen, .letter-content {
                padding: 30px 20px;
            }
            
            .letter-header h1 {
                font-size: 1.5rem;
            }
            
            .letter-content {
                font-size: 1rem;
            }
        }

        /* Success animation */
        .success-check {
            display: none;
            font-size: 50px;
            color: #51cf66;
            margin-bottom: 15px;
        }

        .password-screen.success .lock-icon {
            display: none;
        }

        .password-screen.success .success-check {
            display: block;
        }

        /* Decorative elements animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

        // Typewriter effect
        async function typeLetter() {
            const container = document.getElementById('letterContent');
            const progressBar = document.getElementById('progressBar');
            const skipBtn = document.getElementById('skipBtn');
            
            isTyping = true;
            skipBtn.classList.add('visible');
            
            for (let i = 0; i < letterLines.length; i++) {
                if (!isTyping) break; // Allow interruption
                
                const line = letterLines[i];
                const lineDiv = document.createElement('div');
                lineDiv.className = 'typewriter-line';
                
                // Check if it's the signature (last 2 lines)
                if (i >= letterLines.length - 2) {
                    lineDiv.classList.add('letter-signature');
                }
                
                container.appendChild(lineDiv);
                
                // Fade in the line container
                await new Promise(resolve => setTimeout(resolve, 100));
                lineDiv.classList.add('visible');
                
                // Type characters one by one
                if (line === "") {
                    lineDiv.style.height = "20px";
                } else {
                    lineDiv.classList.add('typing');
                    for (let char of line) {
                        if (!isTyping) {
                            lineDiv.textContent = line;
                            break;
                        }
                        lineDiv.textContent += char;
                        await new Promise(resolve => setTimeout(resolve, typingSpeed));
                    }
                    lineDiv.classList.remove('typing');
                }
                
                // Update progress
                const progress = ((i + 1) / letterLines.length) * 100;
                progressBar.style.width = progress + '%';
                
                // Small pause between lines
                await new Promise(resolve => setTimeout(resolve, 300));
            }
            
            // Show wax seal at the end
            if (isTyping) {
                const seal = document.createElement('div');
                seal.className = 'wax-seal';
                seal.textContent = '❤';
                container.appendChild(seal);
                
                await new Promise(resolve => setTimeout(resolve, 100));
                seal.classList.add('visible');
                
                // Hide skip button and progress bar when done
                skipBtn.classList.remove('visible');
                setTimeout(() => {
                    progressBar.style.opacity = '0';
                }, 500);
            }
            
            isTyping = false;
        }

        // Skip typing animation

                lineDiv.textContent = line;

                container.appendChild(lineDiv);
            });
            
            // Add wax seal
            const seal = document.createElement('div');
            seal.className = 'wax-seal visible';
            seal.textContent = '❤';
            container.appendChild(seal);
            
            progressBar.style.width = '100%';
            setTimeout(() => {
                progressBar.style.opacity = '0';
                skipBtn.classList.remove('visible');
            }, 300);
        }

            const input = document.getElementById('passwordInput');

            const passwordScreen = document.getElementById('passwordScreen');

            if (input.value === CORRECT_PASSWORD) {

                errorMsg.classList.remove('show');
                
                setTimeout(() => {
                    passwordScreen.classList.add('hidden');
                    setTimeout(() => {
                        letterScreen.classList.add('show');
                        // Start typing animation after letter reveals
                        setTimeout(typeLetter, 600);
                    }, 300);
                }, 500);
            } else {
                // Error
                input.classList.add('error');
                errorMsg.classList.add('show');

        function createHearts() {
            const container = document.getElementById('hearts');
            const heartSymbols = ['❤', '💕', '💗', '💖', '💝'];
            
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 10 + 10) + 's';
                heart.style.animationDelay = Math.random() * 15 + 's';
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                container.appendChild(heart);
            }
        }

        // Set current date
        function setDate() {
            const date = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').textContent = date.toLocaleDateString('en-US', options);
        }

        // Password check
        function checkPassword() {
            const input = document.getElementById('passwordInput');
            const errorMsg = document.getElementById('errorMsg');
            const passwordScreen = document.getElementById('passwordScreen');
            const letterScreen = document.getElementById('letterScreen');
            
            if (input.value === CORRECT_PASSWORD) {
                // Success
                passwordScreen.classList.add('success');
                errorMsg.classList.remove('show');
                
                setTimeout(() => {
                    passwordScreen.classList.add('hidden');
                    setTimeout(() => {
                        letterScreen.classList.add('show');
                    }, 300);
                }, 500);
            } else {
                // Error
                input.classList.add('error');
                errorMsg.classList.add('show');
                
                setTimeout(() => {
                    input.classList.remove('error');
                }, 500);
            }
        }

        // Enter key support
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        // Initialize
        createHearts();
        setDate();
    </script>
</body>
  </html>
